<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Beyond Limitations</title>
    <!--
      SPA fallback for static hosts (e.g. GitHub Pages) that serve 404.html
      for unknown paths. It rewrites the requested deep link into a form the
      app can restore, then redirects to index.html. Adapted from the widely
      used spa-github-pages technique. `segmentCount` keeps the project base
      path (/ePortfolio) intact; set it to 0 if you deploy at the site root.
    -->
    <script>
      (function () {
        var segmentCount = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
            '/?/' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
